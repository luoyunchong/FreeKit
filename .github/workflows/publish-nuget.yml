name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
        id: nuget-login

      - name: Restore dependencies
        run: dotnet restore FreeKit.sln

      - name: Build
        run: dotnet build FreeKit.sln --configuration Release --no-restore

      - name: Pack
        run: |
          dotnet pack src/IGeekFan.FreeKit --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.FreeKit.Email --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.FreeKit.Extras --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.FreeKit.Modularity --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.Localization.FreeSql --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.AspNetCore.Identity.FreeSql --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.AspNetCore.DataProtection.FreeSql --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.AspNetCore.DataProtection.FreeRedis --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.Extensions.Diagnostics.HealthChecks.FreeSql --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.AspNetCore.SignalR.FreeRedis --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.OpenIddict.FreeSql --configuration Release --no-build --output ./nupkg/packages
          dotnet pack src/IGeekFan.R2.NET --configuration Release --no-build --output ./nupkg/packages

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/packages/*.nupkg --skip-duplicate -s https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.V3_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkg/packages/*.nupkg
          generate_release_notes: true
